# CLIProxyAPI Configuration for Antigravity + Claude Code
# This configuration works out of the box after running setup-claude-local.ps1/sh

# Server port
port: 8317

# Server host/interface to bind to. Empty binds all interfaces.
host: ""

# Authentication directory (supports ~ for home directory)
auth-dir: "~/.cli-proxy-api"

# API keys for authentication (can use any placeholder for OAuth login)
api-keys:
  - "sk-dummy"

# Enable debug logging (set to true for troubleshooting)
debug: false

# Enable detailed request/response logging (logs to ~/.cli-proxy-api/logs/)
request-log: true

# Number of times to retry a request on errors (403, 408, 500, 502, 503, 504)
request-retry: 3

# Maximum wait time in seconds for a cooled-down credential before triggering a retry
max-retry-interval: 30

# Quota exceeded behavior
quota-exceeded:
  switch-project: true
  switch-preview-model: true

# Routing strategy for selecting credentials when multiple match
# - round-robin: Rotate between all available accounts
# - fill-first: Use one account until quota exhausted, then switch to next
routing:
  strategy: "round-robin"

# TLS settings (disabled by default for local use)
tls:
  enable: false
  cert: ""
  key: ""

# Management API settings
remote-management:
  allow-remote: false
  secret-key: "admin"
  disable-control-panel: false

# When false, disable in-memory usage statistics aggregation
usage-statistics-enabled: false

# When true, write application logs to rotating files instead of stdout
logging-to-file: false

# Proxy URL (uncomment and set if you need a proxy)
# proxy-url: "socks5://127.0.0.1:1080"

# OAuth model name mappings for Antigravity + Claude Code
# Maps Claude Code's official model names to Antigravity API's actual model names
#
# Antigravity API available models:
#   - claude-opus-4-5-thinking
#   - claude-sonnet-4-5-thinking
#   - claude-sonnet-4-5
#   - gemini-2.5-flash
#   - gemini-2.5-flash-lite
#   - gemini-2.5-pro
#   - gemini-3-flash
#   - gemini-3-pro-high
#   - gemini-3-pro-low
#   - gemini-3-pro-image
#   - rev19-uic3-1p (computer use preview)
#   - gpt-oss-120b-medium
#
oauth-model-mappings:
  antigravity:
    # Antigravity支持的模型名称 -> claudecode请求的时候使用的名字

    # Claude Opus 4.5 -> claude-opus-4-5-thinking (with extended thinking)
    - name: "claude-opus-4-5-thinking"
      alias: "claude-opus-4-5-20251101"
    # Claude Sonnet 4.5 -> claude-sonnet-4-5-thinking (with extended thinking)
    - name: "claude-sonnet-4-5-thinking"
      alias: "claude-sonnet-4-5-20250929"
    # Claude Haiku -> gemini-3-flash (no Claude Haiku available, use Gemini as fallback)
    - name: "gemini-3-flash"
      alias: "claude-haiku-4-5-20251001"
    # Sonnet with thinking suffix
    - name: "claude-sonnet-4-5-thinking"
      alias: "claude-sonnet-4-5-20250929-thinking"
    # Opus with thinking suffix
    - name: "claude-opus-4-5-thinking"
      alias: "claude-4-5-20251101-thinking"

